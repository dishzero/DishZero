name: Deploy backend to EC2 instance

on:
  push:
    branches: [ main ]
    paths: [ 'backend/**', '.github/workflows/backend-deploy.yml' ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Rebuild backend and deploy
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5, pinned for supply chain safety; get the new full SHA if we need to upgrade
        with:
          host: ${{ secrets.EC2_URL }}
          username: 'ubuntu'
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Setting up Node ==="
            export NVM_DIR="$HOME/.nvm"
            . "$NVM_DIR/nvm.sh"

            set -e

            echo "=== Installing Node ==="
            nvm install 20
            nvm use 20

            echo "=== Enabling Corepack ==="
            corepack enable

            echo "=== Installing PM2 ==="
            npm i -g pm2

            echo "=== Pulling latest code ==="
            cd /home/ubuntu/DishZero
            git reset --hard HEAD
            git pull

            echo "=== Installing dependencies ==="
            cd backend
            pnpm install --frozen-lockfile

            echo "=== Building ==="
            pnpm run build

            echo "=== Pruning pnpm store ==="
            pnpm store prune

            echo "=== Restarting server ==="
            pm2 restart dishzero || pm2 start pnpm --name dishzero --cwd /home/ubuntu/DishZero/backend -- start

            echo "=== Verifying /health responds ==="
            sleep 15
            if ! curl -sf http://localhost:8080/health; then
              echo "Health check failed. Last 20 error log lines:"
              pm2 logs dishzero --err --lines 20 --nostream
              exit 1
            fi

            echo "=== Saving PM2 ==="
            pm2 save
